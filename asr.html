<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>語音辨識 (ASR)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-4 md:p-8">
  <div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8">
      <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6 text-center">語音辨識 (ASR)</h1>
      
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">辨識語言</label>
        <select id="langCombo" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white text-gray-800">
          <option value="cmn-Hant-TW">中文(台灣)</option>
          <option value="en-US">英文(美國)</option>
        </select>
      </div>

      <div class="flex flex-col sm:flex-row gap-3 mb-6">
        <button id="startStopButton" onclick="startButton(event)" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2">
          <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
          </svg>
          <span id="buttonText">開始辨識</span>
        </button>
        <button id="clearButton" onclick="clearText()" class="flex-1 sm:flex-none bg-gray-500 hover:bg-gray-600 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
          清除文字
        </button>
        <button id="saveButton" onclick="saveResult()" class="flex-1 sm:flex-none bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
          </svg>
          儲存結果
        </button>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">最後結果</label>
        <input id="textBox" type="text" class="w-full p-4 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-lg bg-gray-50" placeholder="語音辨識結果將顯示在這裡..." />
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">中間結果</label>
        <input id="tempBox" type="text" class="w-full p-4 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 text-gray-600" placeholder="即時辨識中..." readonly />
      </div>

      <div id="infoBox" class="text-center text-sm text-gray-500 min-h-6"></div>
    </div>
  </div>

  <script type="text/javascript">
    var infoBox;
    var textBox;
    var tempBox;
    var startStopButton;
    var final_transcript = '';
    var recognizing = false;

    function startButton(event) {
      infoBox = document.getElementById("infoBox");
      textBox = document.getElementById("textBox");
      tempBox = document.getElementById("tempBox");
      startStopButton = document.getElementById("startStopButton");
      var buttonText = document.getElementById("buttonText");
      langCombo = document.getElementById("langCombo");
      
      if (recognizing) {
        recognition.stop();
      } else {
        textBox.value = '';
        tempBox.value = '';
        final_transcript = '';
        recognition.lang = langCombo.value;
        recognition.start();
      }
    }

    function clearText() {
      textBox = document.getElementById("textBox");
      tempBox = document.getElementById("tempBox");
      textBox.value = '';
      tempBox.value = '';
      final_transcript = '';
    }

    function saveResult() {
      textBox = document.getElementById("textBox");
      var content = textBox.value.trim();
      if (content.length === 0) {
        alert('沒有可儲存的內容');
        return;
      }
      var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      var now = new Date();
      var filename = 'asr_' + now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '_' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0') + '.txt';
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    if (!('webkitSpeechRecognition' in window)) {
      infoBox = document.getElementById("infoBox");
      infoBox.innerText = "本瀏覽器不支援語音辨識，請更換瀏覽器！(Chrome 25 版以上才支援語音辨識)";
      infoBox.className = "text-center text-sm text-red-500 min-h-6";
      document.getElementById("startStopButton").disabled = true;
      document.getElementById("startStopButton").className = "flex-1 bg-gray-400 text-white font-semibold py-3 px-6 rounded-lg cursor-not-allowed flex items-center justify-center gap-2";
    } else {
      var recognition = new webkitSpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onstart = function() {
        recognizing = true;
        var buttonText = document.getElementById("buttonText");
        var micIcon = document.getElementById("micIcon");
        buttonText.innerText = "停止辨識";
        startStopButton.className = "flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2";
        infoBox.innerText = "辨識中...";
        infoBox.className = "text-center text-sm text-indigo-600 min-h-6";
      };

      recognition.onend = function() {
        recognizing = false;
        var buttonText = document.getElementById("buttonText");
        var micIcon = document.getElementById("micIcon");
        buttonText.innerText = "開始辨識";
        startStopButton.className = "flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2";
        infoBox.innerText = "";
      };

      recognition.onresult = function(event) {
        var interim_transcript = '';
        for (var i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            final_transcript += event.results[i][0].transcript;
          } else {
            interim_transcript += event.results[i][0].transcript;
          }
        }
        if (final_transcript.trim().length > 0)
            textBox.value = final_transcript;
        if (interim_transcript.trim().length > 0)
            tempBox.value = interim_transcript;
      };
    }
  </script>
</body>
</html>
